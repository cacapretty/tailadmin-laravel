name: Deploy Tailadmin Laravel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      # BUILD DI GITHUB RUNNER (bukan manual)
      - name: Build Image
        run: docker build -t cacapretty/tailadmin-laravel:beta .

      - name: Push Image
        run: docker push cacapretty/tailadmin-laravel:beta

      - name: Run Container
        run: |
          docker rm -f tailadmin_app || true
          docker run -d -p 8090:9000 --name tailadmin_app cacapretty/tailadmin-laravel:beta
